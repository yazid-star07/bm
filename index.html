<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Space Website</title>

<style>

/* Reset dasar */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

/* Body & Background Space */
body{
  background: radial-gradient(ellipse at bottom, #0d0d1a 0%, #000000 100%);
  overflow-x: hidden;
  color: white;
}

/* Stars animation */
.star{
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  animation: twinkle 3s infinite;
}

@keyframes twinkle{
  0%, 100%{opacity:0.5;}
  50%{opacity:1;}
}

/* Header & Menu */
header{
  background: rgba(0,0,0,0.7);
  padding:20px 50px;
  position:relative;
  z-index:10;
}

nav{
  display:flex;
  align-items:center;
}

.logo{
  color:white;
  font-size:22px;
}

.menu{
  list-style:none;
  display:flex;
  margin-left:auto;
}

.menu li{
  margin-left:30px;
}

.menu li a{
  text-decoration:none;
  color:white;
  font-size:16px;
}

.menu-toggle{
  display:none;
  font-size:26px;
  color:white;
  margin-left:auto;
  cursor:pointer;
}

/* Hero Section */
.hero, .start-page{
  height:90vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  flex-direction:column;
  padding:20px;
  position:relative;
  z-index:1;
}

.hero h1{
  font-size:36px;
  color:#ffcc00; /* warna kuning kosmik */
  text-shadow: 0 0 10px #ffcc00, 0 0 20px #ff9900;
}

.hero p{
  margin-top:10px;
  font-size:18px;
  color:#ffffff;
  text-shadow: 0 0 5px #ffffff;
}

button{
  padding:12px 25px;
  background:#ff4d4d;
  color:white;
  border:none;
  cursor:pointer;
  margin-top:20px;
  border-radius:5px;
  transition:0.3s;
}

button:hover{
  background:#e04343;
}

/* Start page hidden */
.start-page{
  display:none;
}

/* Responsive untuk phone */
@media (max-width:768px){
  header{
    padding:15px 20px;
  }

  .menu{
    display:none;
    flex-direction:column;
    width:100%;
    background:#111;
    position:absolute;
    top:70px;
    left:0;
  }

  .menu li{
    margin:15px 0;
    text-align:center;
  }

  .menu.active{
    display:flex;
  }

  .menu-toggle{
    display:block;
  }

  .hero h1{
    font-size:28px;
  }

  .hero p{
    font-size:14px;
  }

  button{
    padding:10px 20px;
  }
}
</style>
</head>

<body>

<header>
<nav>
<h2 class="logo">MySpace</h2>
<div class="menu-toggle" onclick="toggleMenu()">☰</div>
<ul class="menu" id="menu">
<li><a href="#">Home</a></li>
<li><a href="services.html">Services</a></li>
<li><a href="about.html">About</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>
</header>

<section class="hero" id="home">
<h1>Explore The Universe</h1>
<p>Travel through stars, planets, and galaxies with us.</p>
<button onclick="startPage()">selamat datang</button>
</section>

<section class="start-page" id="start">
<h1>Welcome to Space Adventure</h1>
<p>Discover the wonders of the cosmos.</p>
<button onclick="goBack()">Back</button>
</section>

<!-- Stars Elements -->
<script>
// Buat banyak bintang
for(let i=0;i<100;i++){
  let star = document.createElement('div');
  star.className='star';
  star.style.top=Math.random()*100+'vh';
  star.style.left=Math.random()*100+'vw';
  star.style.width=(Math.random()*2+1)+'px';
  star.style.height=(Math.random()*2+1)+'px';
  document.body.appendChild(star);
}

// Fungsi menu & halaman
function startPage(){
  document.getElementById("home").style.display="none";
  document.getElementById("start").style.display="flex";
}
function goBack(){
  document.getElementById("start").style.display="none";
  document.getElementById("home").style.display="flex";
}
function toggleMenu(){
  document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
