<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yazid Space - Inovasi Bahasa Melayu STPM</title>
    <!-- Memasukkan Font Google Moden & Futuristik -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@500;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            /* Latar belakang angkasa nebula yang cerah, dinamik & bertenaga */
            background: radial-gradient(circle at 30% 20%, #3a0ca3 0%, #050014 60%),
                        radial-gradient(circle at 80% 80%, #00f5d4 0%, #0a0028 70%),
                        radial-gradient(circle at 50% 50%, #ff007f 0%, #050014 100%);
            background-blend-mode: screen;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Lapisan Bintang Menggelap (Stars Container) */
        .space-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 8px #ffffff, 0 0 15px #00f5d4;
            animation: flicker 3s infinite ease-in-out;
        }

        @keyframes flicker {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        /* Kad Utama: Memastikan tulisan terasing & tidak ditutupi latar belakang */
        .main-container {
            position: relative;
            z-index: 10;
            background: rgba(10, 5, 30, 0.65); /* Gelap lutsinar untuk menonjolkan teks putih/cyan */
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 2px solid rgba(0, 245, 212, 0.4); /* Sempadan bercahaya cyan */
            padding: 3.5rem 2.5rem;
            border-radius: 24px;
            text-align: center;
            max-width: 650px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7),
                        0 0 40px rgba(255, 0, 127, 0.2);
            animation: floatingCard 6s ease-in-out infinite;
        }

        @keyframes floatingCard {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* Label Kecil Atas */
        .top-badge {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #ff007f; /* Neon Pink */
            font-weight: 900;
            margin-bottom: 1.2rem;
            display: inline-block;
            padding: 6px 16px;
            background: rgba(255, 0, 127, 0.15);
            border-radius: 50px;
            border: 1px solid rgba(255, 0, 127, 0.3);
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
        }

        /* Tajuk Utama yang Sangat Jelas */
        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.6rem;
            font-weight: 900;
            line-height: 1.2;
            color: #ffffff;
            /* Kesan teks gradien putih ke cyan cerah */
            background: linear-gradient(135deg, #ffffff 30%, #00f5d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.8rem;
            filter: drop-shadow(0 2px 10px rgba(0, 245, 212, 0.3));
        }

        /* Subtajuk Bujang Senang (Diperbaiki: Tidak lagi hitam/tenggelam) */
        .sub-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: #ffee32; /* Kuning Neon Terang - Sangat kontras dan jelas! */
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 2.5rem;
            text-shadow: 0 0 12px rgba(255, 238, 50, 0.6);
        }

        /* Butang Mula Gempak */
        .action-button {
            display: inline-block;
            padding: 16px 60px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 900;
            text-decoration: none;
            color: #050014; /* Teks gelap di dalam butang terang */
            background: linear-gradient(45deg, #00f5d4, #ffee32);
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 25px rgba(0, 245, 212, 0.5);
            letter-spacing: 2px;
        }

        .action-button:hover {
            transform: scale(1.1) translateY(-2px);
            box-shadow: 0 0 40px #00f5d4, 0 0 15px #ffee32;
            background: linear-gradient(45deg, #ffee32, #00f5d4);
        }

        /* Responsif untuk Skrin Kecil/Telefon */
        @media (max-width: 480px) {
            .main-title { font-size: 1.8rem; }
            .sub-title { font-size: 1.2rem; }
            .main-container { padding: 2.5rem 1.5rem; }
            .action-button { padding: 14px 45px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <!-- Latar Belakang & Kesan Bintang -->
    <div class="space-overlay" id="starsContainer"></div>

    <!-- Kotak Kandungan (Menjamin Tulisan Sentiasa Jelas) -->
    <div class="main-container">
        <span class="top-badge">Yazid Space</span>
        <h1 class="main-title">INOVASI BAHASA MELAYU STPM</h1>
        <div class="sub-title">BUJANG SENANG</div>
        
        <div>
            <a href="pilihan2.html" class="action-button">MULA</a>
        </div>
    </div>

    <!-- Skrip Dinamik Penjana Bintang Kelip -->
    <script>
        const container = document.getElementById('starsContainer');
        const starCount = 70;

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            
            const size = Math.random() * 3.5 + 1;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            
            star.style.animationDelay = `${Math.random() * 3}s`;
            star.style.animationDuration = `${2 + Math.random() * 2}s`;
            
            container.appendChild(star);
        }
    </script>
</body>
</html>
